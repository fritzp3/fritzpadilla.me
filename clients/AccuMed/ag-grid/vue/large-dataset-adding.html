<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AG Grid - Large Data Set Example (50,000 rows)</title>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-enterprise/dist/ag-grid-enterprise.min.js"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine.css" />
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 1.2rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      font-size: 0.85rem;
      color: #555;
      text-decoration: none;
    }

    .back-link:hover {
      color: #000;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }

    .btn-add {
      padding: 7px 18px;
      font-size: 0.9rem;
      font-family: inherit;
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn-add:hover {
      background: #1256a0;
    }

    #row-count {
      font-size: 0.85rem;
      color: #555;
    }

    #my-grid {
      width: 100%;
      height: 650px;
    }
  </style>
</head>

<body>
  <div id="app">
    <large-dataset-adding />
  </div>

  <script>
    const { createApp, onMounted, ref } = Vue;

    agGrid.ModuleRegistry.registerModules( [
      agGrid.ClientSideRowModelModule,
      agGrid.ColumnsToolPanelModule,
      agGrid.FiltersToolPanelModule,
      agGrid.SetFilterModule,
      agGrid.MultiFilterModule,
      agGrid.MenuModule,
      agGrid.RangeSelectionModule,
      agGrid.RowGroupingModule,
      agGrid.SideBarModule,
      agGrid.StatusBarModule,
      agGrid.ClipboardModule,
      agGrid.ExcelExportModule,
    ] );

    const BATCH_SIZE = 1000;

    function generateRows ( startIndex, count )
    {
      return Array.from( { length: count }, ( _, i ) => ( {
        recordNumber: startIndex + i,
        value1: Math.floor( Math.random() * 10000 ),
        value2: Math.floor( Math.random() * 10000 ),
        value3: Math.floor( Math.random() * 10000 ),
        value4: Math.floor( Math.random() * 10000 ),
        value5: Math.floor( Math.random() * 10000 ),
        value6: Math.floor( Math.random() * 10000 ),
        value7: Math.floor( Math.random() * 10000 ),
      } ) );
    }

    const LargeDatasetAdding = {
      template: `
        <div class="page">
          <a href="../index.html" class="back-link">&#8592; Back to Examples</a>
          <h1>Large Data Set — Add Rows (Vue)</h1>
          <div class="toolbar">
            <button class="btn-add" @click="addRows">+ Add 1,000 Rows</button>
            <span id="row-count">{{ totalRows.toLocaleString() }} rows</span>
          </div>
          <div id="my-grid" class="ag-theme-alpine"></div>
        </div>
      `,
      setup ()
      {
        const totalRows = ref( BATCH_SIZE );
        let gridApi = null;

        const columnDefs = Object.freeze( [
          { headerName: "Record", field: "recordNumber" },
          { headerName: "Value 1", field: "value1" },
          { headerName: "Value 2", field: "value2" },
          { headerName: "Value 3", field: "value3" },
          { headerName: "Value 4", field: "value4" },
          { headerName: "Value 5", field: "value5" },
          { headerName: "Value 6", field: "value6" },
          { headerName: "Value 7", field: "value7" },
        ] );

        onMounted( () =>
        {
          const gridOptions = {
            rowData: generateRows( 0, BATCH_SIZE ),
            columnDefs,
            defaultColDef: {
              flex: 1,
              minWidth: 100,
              filter: true,
              resizable: true,
            },
            sideBar: true,
            statusBar: {
              statusPanels: [
                { statusPanel: "agTotalAndFilteredRowCountComponent", align: "left" },
                { statusPanel: "agSelectedRowCountComponent" },
                { statusPanel: "agAggregationComponent" },
              ],
            },
            enableRangeSelection: true,
            onGridReady ( params )
            {
              params.api.sizeColumnsToFit();
            },
          };

          const gridDiv = document.querySelector( "#my-grid" );
          gridApi = agGrid.createGrid( gridDiv, gridOptions );
        } );

        function addRows ()
        {
          const newRows = generateRows( totalRows.value, BATCH_SIZE );
          gridApi.applyTransaction( { add: newRows } );
          totalRows.value += BATCH_SIZE;
        }

        return { totalRows, addRows };
      },
    };

    createApp( {
      components: { LargeDatasetAdding },
    } ).mount( "#app" );
  </script>
</body>

</html>
